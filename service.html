<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Services</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;

/* BACKGROUND IMAGE */
  background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') no-repeat center center fixed;
  background-size: cover;
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* TITLE */
h1 {
  text-align: center;
  margin-top: 40px;
  font-size: 40px;
  color: #38bdf8;
  animation: fadeDown 1s ease;
}

/* container */
.service-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin: 50px;
}

/* service box */
.service-box {
  width: 250px;
  padding: 20px;
  border-radius: 15px;

  background: rgba(2, 6, 23, 0.7);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;

  animation: float 4s ease-in-out infinite;
  transition: 0.3s;
}

/* hover effect */
.service-box:hover {
  transform: scale(1.08);
  box-shadow: 0 0 30px rgba(56,189,248,0.4);
}

/* colors per box */
.service-box:nth-child(1) {
  border-top: 3px solid #38bdf8;
}

.service-box:nth-child(2) {
  border-top: 3px solid #a78bfa;
}

.service-box:nth-child(3) {
  border-top: 3px solid #facc15;
}

/* animations */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

@keyframes fadeDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* paragraph style */
p {
  font-size: 14px;
  color: #e2e8f0;
}
</style>
</head>

<body>

<section class="services">
  <h1>Our Services</h1>

  <div class="service-container">

    <div class="service-box">
      <h2>Web Design</h2>
      <p>Waxaan sameynaa websites casri ah oo qurux badan.</p>
    </div>

    <div class="service-box">
      <h2>CEO</h2>
      <p>MR/ABDULBARI ZUBAYR HUSSEIN .</p>
    </div>

    <div class="service-box">
      <h2>Graphic Design</h2>
      <p>Logo iyo designyo soo jiidasho leh ayaan kuu sameynaa.</p>
    </div>

  </div>
</section>

</body>
</html>
